<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODRS Payment</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container payment-box">

<h2>ODRS TEAM PAYMENT</h2>

<img src="Fam.png" alt="Payment QR" class="qr-img">

<p>Please scan the QR code and complete the payment.</p>

<div class="acknowledgement">
    <input type="checkbox" id="agree">
    <label for="agree">
        I have completed the payment and provided correct details.
    </label>
</div>

<button id="payBtn" disabled>Submit</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("2HLt93pZy8mj117BT");

const checkbox = document.getElementById("agree");
const submitBtn = document.getElementById("payBtn");

checkbox.addEventListener("change", function () {
    submitBtn.disabled = !this.checked;
});

document.getElementById("payBtn").addEventListener("click", function () {

    const name = localStorage.getItem("odrsName");
    const email = localStorage.getItem("odrsEmail");
    const phone = localStorage.getItem("odrsPhone");
    const offer = localStorage.getItem("odrsOffer");
    const dept = localStorage.getItem("odrsDept");

    const templateParams = {
        name: name,
        email: email,
        phone: phone,
        offer: offer,
        dept: dept
    };

    // Send booking details to ODRS

    emailjs.send(
        "service_zxt5qcd",
        "template_w77svvi",
        templateParams
    )

    .then(function () {

        // Send confirmation email to student

        return emailjs.send(
            "service_zxt5qcd",
            "template_5as3c6f",
            templateParams
        );

    })

    .then(function () {

        alert("ODRS TEAM WILL CONTACT YOU");

        localStorage.clear();

        window.location.href = "index.html";

    })

    .catch(function (error) {

        console.error(error);

        alert("Failed to send email. Please try again.");

    });

});

</script>

</body>
</html>
